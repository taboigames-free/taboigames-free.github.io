<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Game</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>

<body>

<header>
<div class="logo" onclick="location.href='index.html'">TABOI-games</div>
</header>

<div class="container" id="game"></div>

<footer>
TABOI-games - Jogos pré-pagos gratuitos para PC
</footer>

<script>

function getGameID(){
    return new URLSearchParams(location.search).get("game");
}

function redirecionarParaErro(){
    const id = getGameID() || "";
    location.href = `jogo-nao-encontrado.html?game=${encodeURIComponent(id)}`;
}

async function carregarGame(){

    const id = getGameID();

    if(!id){
        redirecionarParaErro();
        return;
    }

    const lista = await fetch("games.json").then(r=>r.json());

    const jogo = lista.find(g=>g.id === id);

    if(!jogo){
        redirecionarParaErro();
        return;
    }

    const data = await fetch(jogo.json).then(r=>r.json());

    let downloads = "";

    data.downloads.forEach(d=>{
        downloads += `
        <a href="${d.link}" target="_blank">
        Download ${d.tipo}
        </a>`;
    });

    document.getElementById("game").innerHTML = `
    <div class="game-page">

        <img class="cover" src="${data.cover}">

        <div>
            <h1>${data.nome}</h1>
            <p>${data.descricao}</p>

            <div class="downloads">
                <h3>Downloads</h3>
                ${downloads}
            </div>
        </div>

    </div>`;
}

carregarGame().catch(redirecionarParaErro);

</script>

</body>
</html>
