<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo não encontrado | TABOI-games</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
<style>
.error-wrap{
    min-height:calc(100vh - 180px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 24px;
}

.error-card{
    width:min(760px, 100%);
    text-align:center;
    background:linear-gradient(170deg, rgba(18,26,48,.92), rgba(8,12,24,.95));
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px 28px;
    box-shadow:var(--shadow);
}

.error-code{
    font-size:clamp(56px, 14vw, 120px);
    line-height:1;
    margin:0;
    letter-spacing:3px;
    color:var(--neon);
    text-shadow:
        0 0 18px rgba(0, 229, 255, .8),
        0 0 40px rgba(155, 92, 255, .45);
    animation:logoPulse 2.4s ease-in-out infinite;
}

.error-title{
    margin:12px 0 8px;
    font-size:clamp(24px, 4vw, 34px);
}

.error-text{
    margin:0 auto;
    max-width:560px;
    color:var(--text-soft);
    line-height:1.7;
}

.error-game-id{
    margin-top:18px;
    color:#b9c8ef;
    font-size:14px;
}

.error-actions{
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:28px;
}

.error-btn{
    display:inline-block;
    border-radius:10px;
    padding:12px 18px;
    font-weight:700;
    text-decoration:none;
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
}

.error-btn.primary{
    color:#071320;
    background:linear-gradient(90deg, var(--neon), #6af7ff);
    box-shadow:0 0 16px rgba(0,229,255,.45);
}

.error-btn.secondary{
    color:var(--text);
    background:linear-gradient(180deg, rgba(26,36,64,.96), rgba(13,20,38,.96));
    border:1px solid var(--border);
}

.error-btn:hover{
    transform:translateY(-2px);
    filter:brightness(1.06);
}
</style>
</head>
<body>

<header>
    <div class="logo" onclick="location.href='home.html'">TABOI-games</div>
    <nav>
        <a href="home.html">Home</a>
        <a href="games.html">Games</a>
    </nav>
</header>

<main class="error-wrap">
    <section class="error-card">
        <p class="error-code">404</p>
        <h1 class="error-title">Jogo não encontrado</h1>
        <p class="error-text">
            O jogo que você tentou abrir não existe, foi removido ou o link está incompleto.
            Confira o catálogo e escolha outro título para continuar.
        </p>
        <p class="error-game-id" id="game-id"></p>

        <div class="error-actions">
            <a class="error-btn primary" href="games.html">Ver todos os jogos</a>
            <a class="error-btn secondary" href="home.html">Voltar para Home</a>
        </div>
    </section>
</main>

<footer>
    TABOI-games - Jogos pré-pagos gratuitos para PC
</footer>

<script>
const gameID = new URLSearchParams(location.search).get("game");
if(gameID){
    document.getElementById("game-id").textContent = `ID solicitado: ${gameID}`;
}
</script>

</body>
</html>
