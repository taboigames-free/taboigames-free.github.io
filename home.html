<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TABOI-games</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>

<body>

<header>
<div class="logo" onclick="location.href='https://taboigames.github.io/home.html'">
TABOI-games
</div>

<nav>
<a href="https://taboigames-free.github.io/home.html">Home</a>
<a href="https://taboigames-free.github.io/games.html">Games</a>
<a href="https://github.com/taboigames-free/taboigames-free.github.io/tree/main">Ver no GitHub</a>
</nav>
</header>

<div class="top-slider">
    <div class="top-bg" id="top-bg"></div>

    <div class="top-content">
        <h1 id="top-title"></h1>

        <div class="dots" id="dots"></div>
    </div>
</div>
    
<div class="container">
<h2>Jogos</h2>
<div class="games" id="games"></div>
</div>

<footer>
<p>TABOI-games - Jogos pré-pagos gratuitos para PC (Dev: ViquinhoDev💖)</p>
<a href="https://github.com/taboigames-free/taboigames-free.github.io/tree/main">
Ver no GitHub
</a>
</footer>

<script>
async function carregarJogos(){

    const res = await fetch("games.json");
    const jogos = await res.json();

    const container = document.getElementById("games");

    // mantém ordem e limita a 12
    const jogosLimitados = jogos.slice(0, 12);

    for (const jogo of jogosLimitados){

        const r = await fetch(jogo.json);
        const data = await r.json();

        container.innerHTML += `
        <div class="game"
        onclick="location.href='thegame.html?game=${data.id}'">

            <img src="${data.cover}">
            <h3>${data.nome}</h3>

        </div>`;
    }
}

carregarJogos();
</script>
</body>
</html>
