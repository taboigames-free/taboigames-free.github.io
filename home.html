<script>
async function carregarJogos(){

    const res = await fetch("games.json");
    const jogos = await res.json();

    const container = document.getElementById("games");

    // mantém ordem e limita a 12
    const jogosLimitados = jogos.slice(0, 12);

    for (const jogo of jogosLimitados){

        const r = await fetch(jogo.json);
        const data = await r.json();

        container.innerHTML += `
        <div class="game"
        onclick="location.href='thegame.html?game=${data.id}'">

            <img src="${data.cover}">
            <h3>${data.nome}</h3>

        </div>`;
    }
}

carregarJogos();
</script>
<script>
let topJogos = [];
let index = 0;

async function carregarTop(){

    const res = await fetch("top-games.json");
    const lista = await res.json();

    for (const item of lista){

        const r = await fetch(item.json);
        const data = await r.json();

        topJogos.push(data);
    }

    criarDots();
    mostrarTop(0);
    loop();
}

function criarDots(){
    const dots = document.getElementById("dots");

    topJogos.forEach((_,i)=>{
        dots.innerHTML += `<span onclick="mostrarTop(${i})"></span>`;
    });
}

function mostrarTop(i){

    index = i;

    const jogo = topJogos[i];

document.getElementById("top-bg").style.backgroundImage =
    `url('${jogo.imagemdefundo || jogo.cover}')`;

    document.getElementById("top-title").innerText = jogo.nome;

    document.querySelectorAll(".dots span").forEach(d=>d.classList.remove("active"));
    document.querySelectorAll(".dots span")[i].classList.add("active");
}

function loop(){
    setInterval(()=>{
        index = (index + 1) % topJogos.length;
        mostrarTop(index);
    },5000);
}

carregarTop();
</script>
