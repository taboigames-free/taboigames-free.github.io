<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Games - TABOI</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>


<body>

<header>
<div class="logo" onclick="location.href='index.html'">TABOI-games</div>

<nav>
<a href="index.html">Home</a>
<a href="games.html">Games</a>
<a href="https://github.com/taboigames-free/taboigames-free.github.io/tree/main">GitHub</a>
</nav>
</header>

<div class="container">

<input class="search" id="search" placeholder="Pesquisar jogo...">

<div class="games" id="games"></div>

</div>

<footer>
TABOI-games - Jogos pré-pagos gratuitos para PC
</footer>

<script>
let lista = [];

async function carregar() {
    const res = await fetch("games.json");
    const jogos = await res.json();

    // Em games.html não existe limitação: carregamos 100% da lista.
    lista = await Promise.all(
        jogos.map(async (jogo) => {
            const r = await fetch(jogo.json);
            return r.json();
        })
    );

    mostrar("");
}

function mostrar(filtro) {
    const termo = filtro.toLowerCase();
    const container = document.getElementById("games");

    container.innerHTML = "";

    for (const data of lista) {
        if (!data.nome.toLowerCase().includes(termo)) {
            continue;
        }

        container.innerHTML += `
        <div class="game"
        onclick="location.href='thegame.html?game=${data.id}'">

            <img src="${data.cover}">
            <h3>${data.nome}</h3>

        </div>`;
    }
}

document.getElementById("search").oninput =
(e) => mostrar(e.target.value);

carregar();
</script>

</body>
</html>
